<mat-card>
  <mat-card-title-group>
    <mat-card-title>
      <a mat-button routerLink="/catalog/promotions">
        <mat-icon>arrow_back</mat-icon></a
      >Promotion #{{ (promotion$ | async)?.id }}
    </mat-card-title>
  </mat-card-title-group>
  <mat-tab-group dynamicHeight>
    <mat-tab>
      <ng-template mat-tab-label>
        <mat-icon class="mat-tab-icon">shopping_cart</mat-icon>
        Products
      </ng-template>
      <mat-card-content>
        <app-category-products
          *ngIf="promotion$ | async"
          [promotion]="(promotion$ | async) ?? null"
        ></app-category-products>
      </mat-card-content>
    </mat-tab>
    <mat-tab>
      <ng-template mat-tab-label>
          <mat-icon class="mat-tab-icon">info</mat-icon>
          General
        </ng-template>
        <mat-card-content>
        <!-- <app-order-details
          *ngIf="order$ | async"
          [order]="(order$ | async) ?? null"
        ></app-order-details -->
      </mat-card-content>
    </mat-tab>
    <!-- <mat-tab>
      <ng-template mat-tab-label>
        <mat-icon class="mat-tab-icon">edit</mat-icon>
        Edit
      </ng-template>
      <mat-card-content>
      </mat-card-content>
    </mat-tab> -->
  </mat-tab-group>
</mat-card>
