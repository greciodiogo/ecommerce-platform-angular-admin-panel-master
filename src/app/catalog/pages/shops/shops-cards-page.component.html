<div class="shops-cards-container">
  <mat-card class="shop-card create-shop-card" (click)="openCreateShopDialog()">
    <mat-card-content>
      <div class="create-shop-content">
        <mat-icon>add_circle_outline</mat-icon>
        <span>Create New Shop</span>
      </div>
    </mat-card-content>
  </mat-card>

  <ng-container *ngIf="shops$ | async as shops">
    <mat-card class="shop-card" *ngFor="let shop of shops" (click)="viewShop(shop)">
      <mat-card-header>
        <div mat-card-avatar class="shop-avatar">
          <ng-container *ngIf="shop.shopName; else storeIcon">
            {{ shop.shopName | uppercase }}
          </ng-container>
          <ng-template #storeIcon>
            <mat-icon>storefront</mat-icon>
          </ng-template>
        </div>
        <mat-card-title>{{ shop.shopName }}</mat-card-title>
        <!-- <mat-card-subtitle>{{ shop?.email }}</mat-card-subtitle> -->
      </mat-card-header>
      <mat-card-content>
        <div class="shop-details">
          <div *ngIf="shop.address">{{ shop.address }}</div>
          <div *ngIf="shop.contactPhone">Phone: {{ shop.contactPhone }}</div>
        </div>
      </mat-card-content>
      <mat-card-actions>
        <button mat-button color="primary">View</button>
      </mat-card-actions>
    </mat-card>
  </ng-container>
</div>
