<mat-card class="promotion-modal">
  <mat-card-title-group>
    <mat-card-title>
      <a mat-button routerLink="/catalog/promotions" style="display: flex; align-items: center; justify-content: center;">
        <mat-icon>arrow_back</mat-icon></a
      >Create New Promotion
    </mat-card-title>
  </mat-card-title-group>
  <mat-card-content>
    <form [formGroup]="createForm" (submit)="save()">
      <div class="form-fields">
        <mat-form-field appearance="outline">
          <mat-label>Name</mat-label>
          <mat-icon matPrefix>local_offer</mat-icon>
          <input matInput type="text" formControlName="name" />
          <mat-error *ngIf="createForm.controls.name.invalid">
            Invalid Name
          </mat-error>
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Description</mat-label>
          <mat-icon matPrefix>description</mat-icon>
          <input matInput type="text" formControlName="description" />
          <mat-error *ngIf="createForm.controls.description.invalid">
            Invalid Description
          </mat-error>
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Start Date</mat-label>
          <mat-icon matPrefix>event</mat-icon>
          <input matInput [matDatepicker]="pickerStart" formControlName="startDate" />
          <mat-datepicker-toggle matSuffix [for]="pickerStart">
            <mat-icon matDatepickerToggleIcon>event</mat-icon>
          </mat-datepicker-toggle>
          <mat-datepicker #pickerStart></mat-datepicker>
          <mat-error *ngIf="createForm.controls.startDate.invalid">
            Invalid Start Date
          </mat-error>
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>End Date</mat-label>
          <mat-icon matPrefix>event</mat-icon>
          <input matInput [matDatepicker]="pickerEnd" formControlName="endDate" />
          <mat-datepicker-toggle matSuffix [for]="pickerEnd">
            <mat-icon matDatepickerToggleIcon>event</mat-icon>
          </mat-datepicker-toggle>
          <mat-datepicker #pickerEnd></mat-datepicker>
          <mat-error *ngIf="createForm.controls.endDate.invalid">
            Invalid End Date
          </mat-error>
        </mat-form-field>
        <mat-form-field appearance="outline" class="discount"  [appAuthRole]="['admin', 'sales']">
          <mat-label>Discount (%)</mat-label>
          <mat-icon matPrefix>percent</mat-icon>
          <input type="number" matInput required formControlName="discount" />
          <mat-error>Invalid Discount</mat-error>
        </mat-form-field>
      </div>
      <div class="details">
        <div class="buttons">
          <button
            mat-button
            type="button"
            routerLink="/catalog/promotions"
            color="primary"
          >
            Cancel
          </button>
          <button
            mat-flat-button
            type="submit"
            [disabled]="!createForm.valid || !createForm.dirty"
            color="primary"
          >
            Create
          </button>
        </div>
      </div>
    </form>
  </mat-card-content>
</mat-card>
