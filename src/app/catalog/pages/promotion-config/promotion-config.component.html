<mat-card>
  <mat-card-title-group>
    <mat-card-title>
      <a mat-button (click)="goBack()">
        <mat-icon>arrow_back</mat-icon>
      </a>
      Configuração de Promoção - Default
    </mat-card-title>
  </mat-card-title-group>

  <mat-card-content>
    <div *ngIf="loading" class="loading-container">
      <mat-spinner></mat-spinner>
    </div>

    <form *ngIf="!loading" [formGroup]="editForm" (submit)="save()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Percentagem de Desconto (%)</mat-label>
        <input matInput type="number" formControlName="discount" min="0" max="100" />
        <mat-hint>Digite a percentagem de desconto (0-100)</mat-hint>
        <mat-error *ngIf="editForm.get('discount')?.hasError('required')">
          Percentagem é obrigatória
        </mat-error>
        <mat-error *ngIf="editForm.get('discount')?.hasError('min')">
          Percentagem deve ser no mínimo 0
        </mat-error>
        <mat-error *ngIf="editForm.get('discount')?.hasError('max')">
          Percentagem deve ser no máximo 100
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Data de Início</mat-label>
        <input matInput type="date" formControlName="startDate" />
        <mat-error *ngIf="editForm.get('startDate')?.hasError('required')">
          Data de início é obrigatória
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Data de Fim</mat-label>
        <input matInput type="date" formControlName="endDate" />
        <mat-error *ngIf="editForm.get('endDate')?.hasError('required')">
          Data de fim é obrigatória
        </mat-error>
      </mat-form-field>

      <div class="button-container">
        <button
          mat-flat-button
          type="submit"
          [disabled]="!editForm.valid || !editForm.dirty"
          color="primary"
          [ngClass]="{
            'admin_color': (role$ | async) === 'admin',
            'sales_color': (role$ | async) === 'sales',
            'manager_color': (role$ | async) === 'manager'
          }"
        >
          Salvar
        </button>
        <button mat-button type="button" (click)="resetValues()" color="primary">
          Cancelar
        </button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
