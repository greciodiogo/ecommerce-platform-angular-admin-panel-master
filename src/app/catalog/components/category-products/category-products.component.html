<div class="products-list">
  <app-product-card
    *ngFor="let product of getProducts()"
    [product]="product"
    (delete)="deleteProduct($event)"
  ></app-product-card>
  <span *ngIf="getProducts().length === 0" class="mat-headline">
    No products found
  </span>
</div>

<mat-divider></mat-divider>

<app-categories-products-add-form
  [category]="category"
  [promotion]="promotion"
  (addProduct)="onAddProduct($event)"
></app-categories-products-add-form>
