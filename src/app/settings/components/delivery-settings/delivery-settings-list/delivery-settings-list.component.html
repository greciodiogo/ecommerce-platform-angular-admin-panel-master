<mat-card>
  <mat-card-header>
    <mat-card-title>Configurações de Entrega</mat-card-title>
    <mat-card-subtitle>Gerencie as configurações globais do sistema de entrega</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    <div *ngIf="loading" class="loading-container">
      <mat-spinner diameter="50"></mat-spinner>
    </div>

    <table mat-table [dataSource]="settings" *ngIf="!loading" class="settings-table">
      <!-- Coluna: Configuração -->
      <ng-container matColumnDef="key">
        <th mat-header-cell *matHeaderCellDef>Configuração</th>
        <td mat-cell *matCellDef="let setting">
          <strong>{{ getKeyLabel(setting.key) }}</strong>
        </td>
      </ng-container>

      <!-- Coluna: Valor Atual -->
      <ng-container matColumnDef="value">
        <th mat-header-cell *matHeaderCellDef>Valor Atual</th>
        <td mat-cell *matCellDef="let setting">
          <span class="value-display">{{ getDisplayValue(setting) }}</span>
          <span class="value-unit" *ngIf="setting.key === 'delivery.default_fee'">Kz</span>
          <span class="value-unit" *ngIf="setting.key === 'delivery.extra_km_fee'">Kz/km</span>
          <span class="value-unit" *ngIf="setting.key === 'delivery.default_radius_km'">km</span>
          <span class="value-unit" *ngIf="setting.key === 'delivery.min_order_for_free_delivery'">Kz</span>
        </td>
      </ng-container>

      <!-- Coluna: Tipo -->
      <ng-container matColumnDef="type">
        <th mat-header-cell *matHeaderCellDef>Tipo</th>
        <td mat-cell *matCellDef="let setting">
          <mat-chip [color]="setting.type === 'number' ? 'primary' : 'accent'" selected>
            {{ setting.type }}
          </mat-chip>
        </td>
      </ng-container>

      <!-- Coluna: Descrição -->
      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef>Descrição</th>
        <td mat-cell *matCellDef="let setting">
          <small class="description-text">{{ setting.description }}</small>
        </td>
      </ng-container>

      <!-- Coluna: Ações -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Ações</th>
        <td mat-cell *matCellDef="let setting">
          <button mat-icon-button color="primary" (click)="editSetting(setting)" matTooltip="Editar">
            <mat-icon>edit</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <div *ngIf="!loading && settings.length === 0" class="no-data">
      <mat-icon>settings</mat-icon>
      <p>Nenhuma configuração encontrada</p>
    </div>
  </mat-card-content>
</mat-card>
