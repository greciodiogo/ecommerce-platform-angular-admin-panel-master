<h2 mat-dialog-title>Editar Configuração</h2>

<mat-dialog-content>
  <form [formGroup]="form">
    <div class="setting-info">
      <h3>{{ getKeyLabel() }}</h3>
      <p class="description">{{ data.description }}</p>
    </div>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Valor</mat-label>
      <input 
        matInput 
        formControlName="value" 
        [type]="getInputType()"
        [placeholder]="'Digite o novo valor'"
      >
      <span matSuffix *ngIf="getUnit()">{{ getUnit() }}</span>
      <mat-error *ngIf="form.get('value')?.hasError('required')">
        Valor é obrigatório
      </mat-error>
      <mat-error *ngIf="form.get('value')?.hasError('pattern')">
        Valor deve ser um número válido
      </mat-error>
    </mat-form-field>

    <div class="current-value">
      <mat-icon>info</mat-icon>
      <span>Valor atual: <strong>{{ data.value }} {{ getUnit() }}</strong></span>
    </div>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()" [disabled]="saving">
    Cancelar
  </button>
  <button 
    mat-raised-button 
    color="primary" 
    (click)="onSave()" 
    [disabled]="form.invalid || saving"
  >
    <mat-spinner diameter="20" *ngIf="saving"></mat-spinner>
    <span *ngIf="!saving">Salvar</span>
  </button>
</mat-dialog-actions>
