<h2 mat-dialog-title>{{ isEditMode ? 'Editar' : 'Adicionar' }} Search Tag</h2>

<mat-dialog-content>
  <form [formGroup]="form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Tag</mat-label>
      <input matInput formControlName="tag" placeholder="Ex: iPhone, Samsung, Laptop">
      <mat-error *ngIf="form.get('tag')?.hasError('required')">
        Tag é obrigatória
      </mat-error>
      <mat-error *ngIf="form.get('tag')?.hasError('maxlength')">
        Máximo 100 caracteres
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Ícone (Material Icon)</mat-label>
      <mat-select formControlName="icon">
        <mat-option [value]="null">Nenhum</mat-option>
        <mat-option *ngFor="let icon of commonIcons" [value]="icon">
          <mat-icon>{{ icon }}</mat-icon>
          {{ icon }}
        </mat-option>
      </mat-select>
    </mat-form-field>

    <div class="color-field">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Cor</mat-label>
        <input matInput type="color" formControlName="color">
      </mat-form-field>
      <div class="color-preview" [style.background-color]="form.get('color')?.value">
        {{ form.get('color')?.value }}
      </div>
    </div>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Ordem</mat-label>
      <input matInput type="number" formControlName="order" placeholder="0">
      <mat-hint>Menor número aparece primeiro</mat-hint>
    </mat-form-field>

    <mat-checkbox formControlName="active">
      Tag ativa (visível no app)
    </mat-checkbox>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()" [disabled]="saving">
    Cancelar
  </button>
  <button 
    mat-raised-button 
    color="primary" 
    (click)="onSave()" 
    [disabled]="form.invalid || saving"
  >
    <mat-spinner diameter="20" *ngIf="saving"></mat-spinner>
    <span *ngIf="!saving">{{ isEditMode ? 'Atualizar' : 'Criar' }}</span>
  </button>
</mat-dialog-actions>
