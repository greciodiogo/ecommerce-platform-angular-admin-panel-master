<mat-card>
  <mat-card-header>
    <mat-card-title>Search Tags</mat-card-title>
    <mat-card-subtitle>Gerencie as tags de pesquisa sugeridas no app mobile</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    <div class="header-actions">
      <button mat-raised-button color="primary" (click)="addTag()">
        <mat-icon>add</mat-icon>
        Adicionar Tag
      </button>
    </div>

    <!-- Loading -->
    <div *ngIf="loading" class="loading-container">
      <mat-spinner diameter="50"></mat-spinner>
    </div>

    <!-- Tabela com Drag & Drop -->
    <table 
      mat-table 
      [dataSource]="tags" 
      *ngIf="!loading" 
      class="tags-table"
      cdkDropList
      (cdkDropListDropped)="drop($event)"
    >
      <!-- Drag Handle -->
      <ng-container matColumnDef="drag">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let tag" cdkDrag>
          <mat-icon class="drag-handle" cdkDragHandle>drag_indicator</mat-icon>
        </td>
      </ng-container>

      <!-- Tag -->
      <ng-container matColumnDef="tag">
        <th mat-header-cell *matHeaderCellDef>Tag</th>
        <td mat-cell *matCellDef="let tag">
          <strong>{{ tag.tag }}</strong>
        </td>
      </ng-container>

      <!-- Icon -->
      <ng-container matColumnDef="icon">
        <th mat-header-cell *matHeaderCellDef>Ícone</th>
        <td mat-cell *matCellDef="let tag">
          <mat-icon *ngIf="tag.icon">{{ tag.icon }}</mat-icon>
          <span *ngIf="!tag.icon" class="no-icon">-</span>
        </td>
      </ng-container>

      <!-- Color -->
      <ng-container matColumnDef="color">
        <th mat-header-cell *matHeaderCellDef>Cor</th>
        <td mat-cell *matCellDef="let tag">
          <div class="color-preview" *ngIf="tag.color" [style.background-color]="tag.color">
            <span>{{ tag.color }}</span>
          </div>
          <span *ngIf="!tag.color" class="no-color">-</span>
        </td>
      </ng-container>

      <!-- Clicks -->
      <ng-container matColumnDef="clicks">
        <th mat-header-cell *matHeaderCellDef>Cliques</th>
        <td mat-cell *matCellDef="let tag">
          <span class="click-count">{{ tag.click_count }}</span>
        </td>
      </ng-container>

      <!-- Active -->
      <ng-container matColumnDef="active">
        <th mat-header-cell *matHeaderCellDef>Ativo</th>
        <td mat-cell *matCellDef="let tag">
          <mat-slide-toggle 
            [checked]="tag.active" 
            (change)="toggleActive(tag)"
            color="primary"
          ></mat-slide-toggle>
        </td>
      </ng-container>

      <!-- Actions -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Ações</th>
        <td mat-cell *matCellDef="let tag">
          <button mat-icon-button color="primary" (click)="editTag(tag)" matTooltip="Editar">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="deleteTag(tag)" matTooltip="Deletar">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" cdkDrag></tr>
    </table>

    <!-- Sem dados -->
    <div *ngIf="!loading && tags.length === 0" class="no-data">
      <mat-icon>label_off</mat-icon>
      <p>Nenhuma tag encontrada</p>
      <button mat-raised-button color="primary" (click)="addTag()">
        Adicionar Primeira Tag
      </button>
    </div>
  </mat-card-content>
</mat-card>
