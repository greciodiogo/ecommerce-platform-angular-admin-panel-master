<div class="version-section" *ngIf="versions">
  <div class="charts-grid">
    <!-- Version Distribution Chart -->
    <mat-card>
      <mat-card-header>
        <mat-card-title>Version Distribution</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <apx-chart
          *ngIf="chartOptions.series"
          [series]="chartOptions.series"
          [chart]="chartOptions.chart!"
          [labels]="chartOptions.labels!"
          [colors]="chartOptions.colors!"
          [legend]="chartOptions.legend!"
          [dataLabels]="chartOptions.dataLabels!"
          [plotOptions]="chartOptions.plotOptions!"
          [responsive]="chartOptions.responsive!"
        ></apx-chart>
      </mat-card-content>
    </mat-card>

    <!-- Version Details -->
    <mat-card>
      <mat-card-header>
        <mat-card-title>Version Details</mat-card-title>
        <mat-chip color="primary" selected>Latest: v{{ versions.latestVersion }}</mat-chip>
      </mat-card-header>
      <mat-card-content>
        <!-- Update Rate -->
        <div class="update-rate">
          <div class="update-header">
            <span>Update Rate</span>
            <strong>{{ versions.updateRate.toFixed(1) }}%</strong>
          </div>
          <mat-progress-bar 
            mode="determinate" 
            [value]="versions.updateRate"
            color="primary">
          </mat-progress-bar>
          <small>Users on latest version</small>
        </div>

        <!-- Version List -->
        <div class="version-list">
          <div *ngFor="let version of versions.distribution; let i = index" class="version-item">
            <div class="version-header">
              <div>
                <strong>v{{ version.version }}</strong>
                <mat-chip *ngIf="version.version === versions.latestVersion" color="primary" selected>
                  Latest
                </mat-chip>
              </div>
              <div class="version-stats">
                <div>{{ version.count | number }}</div>
                <small>{{ version.percentage.toFixed(1) }}%</small>
              </div>
            </div>
            <mat-progress-bar 
              mode="determinate" 
              [value]="version.percentage"
              [color]="i === 0 ? 'primary' : i === 1 ? 'accent' : 'warn'">
            </mat-progress-bar>
          </div>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
</div>
