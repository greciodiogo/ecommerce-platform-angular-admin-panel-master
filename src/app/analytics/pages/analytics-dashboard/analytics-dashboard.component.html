<div class="analytics-dashboard">
  <!-- Page Header -->
  <div class="d-sm-flex align-items-center justify-content-between mb-4">
    <h1 class="h3 mb-0 text-gray-800">
      <i class="fas fa-chart-line mr-2"></i>
      App Analytics
    </h1>
    <div class="d-flex align-items-center">
      <!-- Data Source Badge -->
      <span
        *ngIf="analyticsData"
        class="badge mr-3"
        [ngClass]="getDataSourceBadgeClass()"
      >
        <i class="fas fa-database mr-1"></i>
        {{ getDataSourceLabel() }}
      </span>

      <!-- Period Selector -->
      <div class="btn-group mr-3" role="group">
        <button
          *ngFor="let period of periods"
          type="button"
          class="btn btn-sm"
          [class.btn-primary]="selectedPeriod === period.value"
          [class.btn-outline-primary]="selectedPeriod !== period.value"
          (click)="onPeriodChange(period.value)"
        >
          {{ period.label }}
        </button>
      </div>

      <!-- Refresh Button -->
      <button
        class="btn btn-sm btn-primary"
        (click)="refreshData()"
        [disabled]="loading"
      >
        <i class="fas fa-sync-alt" [class.fa-spin]="loading"></i>
        <span class="d-none d-sm-inline ml-2">Refresh</span>
      </button>
    </div>
  </div>

  <!-- Loading State -->
  <div *ngIf="loading && !analyticsData" class="text-center py-5">
    <div class="spinner-border text-primary" role="status">
      <span class="sr-only">Loading...</span>
    </div>
    <p class="mt-3 text-muted">Loading analytics data...</p>
  </div>

  <!-- Error State -->
  <div *ngIf="error" class="alert alert-danger" role="alert">
    <i class="fas fa-exclamation-triangle mr-2"></i>
    {{ error }}
    <button type="button" class="close" (click)="error = null">
      <span>&times;</span>
    </button>
  </div>

  <!-- Analytics Content -->
  <div *ngIf="analyticsData && !loading">
    <!-- Last Updated -->
    <div class="alert alert-info mb-4" role="alert">
      <i class="fas fa-info-circle mr-2"></i>
      Last updated: {{ analyticsData.lastUpdated | date: 'medium' }}
    </div>

    <!-- Overview Cards -->
    <app-overview-cards [metrics]="analyticsData.overview"></app-overview-cards>

    <!-- Downloads Charts -->
    <app-downloads-chart [downloads]="analyticsData.downloads"></app-downloads-chart>

    <!-- Ratings and Reviews -->
    <app-ratings-chart [ratings]="analyticsData.ratings"></app-ratings-chart>

    <!-- Version Distribution -->
    <app-version-distribution [versions]="analyticsData.versions"></app-version-distribution>
  </div>
</div>
