<div class="analytics-dashboard">
  <!-- Page Header -->
  <div class="dashboard-header">
    <h1>
      <mat-icon>analytics</mat-icon>
      App Analytics
    </h1>
    <div class="dashboard-actions">
      <!-- Data Source Badge -->
      <mat-chip *ngIf="analyticsData" [style.background-color]="getDataSourceColor()">
        {{ getDataSourceLabel() }}
      </mat-chip>

      <!-- Period Selector -->
      <mat-button-toggle-group [value]="selectedPeriod" (change)="onPeriodChange($event.value)">
        <mat-button-toggle *ngFor="let period of periods" [value]="period.value">
          {{ period.label }}
        </mat-button-toggle>
      </mat-button-toggle-group>

      <!-- Refresh Button -->
      <button mat-raised-button color="primary" (click)="refreshData()" [disabled]="loading">
        <mat-icon [class.spinning]="loading">refresh</mat-icon>
        Refresh
      </button>
    </div>
  </div>

  <!-- Loading State -->
  <div *ngIf="loading && !analyticsData" class="loading-container">
    <mat-spinner></mat-spinner>
    <p>Loading analytics data...</p>
  </div>

  <!-- Error State -->
  <mat-card *ngIf="error" class="error-card">
    <mat-card-content>
      <div class="error-content">
        <mat-icon color="warn">error</mat-icon>
        <span>{{ error }}</span>
        <button mat-icon-button (click)="error = null">
          <mat-icon>close</mat-icon>
        </button>
      </div>
    </mat-card-content>
  </mat-card>

  <!-- Analytics Content -->
  <div *ngIf="analyticsData && !loading">
    <!-- Last Updated -->
    <mat-card class="info-card">
      <mat-card-content>
        <mat-icon>info</mat-icon>
        Last updated: {{ analyticsData.lastUpdated | date: 'medium' }}
      </mat-card-content>
    </mat-card>

    <!-- Overview Cards -->
    <app-overview-cards [metrics]="analyticsData.overview"></app-overview-cards>

    <!-- Downloads Charts -->
    <app-downloads-chart [downloads]="analyticsData.downloads"></app-downloads-chart>

    <!-- Ratings and Reviews -->
    <app-ratings-chart [ratings]="analyticsData.ratings"></app-ratings-chart>

    <!-- Version Distribution -->
    <app-version-distribution [versions]="analyticsData.versions"></app-version-distribution>
  </div>
</div>
